version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: url_shortner_mysql_1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlshortener
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - url_shortner_default
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: url_shortner_api_1
    environment:
      - DB_HOST=mysql
      - DB_USER=admin
      - DB_PASS=root
      - DB_NAME=urlshortener
    ports:
      - "5001:5000"
    depends_on:
      - mysql
    networks:
      - url_shortner_default
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: url_shortner_frontend_1
    ports:
      - "80:80"
    networks:
      - url_shortner_default
networks:
  url_shortner_default:
    driver: bridge
volumes:
  mysql-data:
