---
# k8s/api-deployment.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: url-shortener
data:
  DB_HOST: mysql-service
  DB_USER: admin
  DB_PASS: root
  DB_NAME: urlshortener

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: url_shortner_api:latest
        imagePullPolicy: Never  # Use local images only
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: api-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: url-shortener
spec:
  selector:
    app: api
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
