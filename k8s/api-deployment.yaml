apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: url_shortener
data:
  DB_HOST: mysql-service
  DB_USER: admin
  DB_NAME: urlshortener
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: url_shortener
type: Opaque
data:
  DB_PASS: cm9vdA==  # base64 encoded 'root'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: url_shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: url_shortener-api:latest
        imagePullPolicy: Never  # Use local images
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_NAME
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          timeoutSeconds: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: url_shortener
spec:
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30081
  type: NodePort