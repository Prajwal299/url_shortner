apiVersion: v1
kind: Pod
metadata:
  name: load-test
  namespace: url-shortener
spec:
  containers:
  - name: load-test
    image: busybox:latest
    command: ["/bin/sh"]
    args: ["-c", "while true; do wget -q --spider http://api-service:5000/health; sleep 0.1; done"]
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
